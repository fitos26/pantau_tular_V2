sonar.projectKey=PPL-BRIN-2025_pantautular-fe-2025
sonar.organization=ppl-brin-2025

# Optional: nice display name
sonar.projectName=pantautular-fe-2025
sonar.projectVersion=1.0

# Source code location (relative to project root)
sonar.sources=app

# Test code location
sonar.tests=__tests__

# Include only test files
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx

# Encoding
sonar.sourceEncoding=UTF-8

# Coverage report path (generated by Jest with --coverage)
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.javascript.lcov.reportPaths=coverage/lcov.info
